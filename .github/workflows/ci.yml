name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks (macOS, Python 3.12)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py312-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-py312-uv-

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Ty
        run: uv run ty check

      - name: SPDX headers
        run: uv run python scripts/license_headers.py --check

      - name: Pytest
        run: uv run pytest -q
