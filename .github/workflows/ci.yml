name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks-mlx:
    name: Checks (MLX, macOS)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Git metadata sanity
        run: git submodule status --recursive > /dev/null

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          environments: mlx-dev
          frozen: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Interpreter sanity
        run: pixi run -e mlx-dev python -c "import sys; print(sys.version)"

      - name: Ruff
        run: pixi run -e mlx-dev lint

      - name: Ty
        run: pixi run -e mlx-dev typecheck

      - name: SPDX headers
        run: pixi run -e mlx-dev license-check

      - name: Benchmark examples
        run: |
          pixi run -e mlx-dev pytest tests/test_benchmark_examples.py tests/test_benchmark_cli.py -q
          for config in examples/benchmarks/*.toml; do
            pixi run -e mlx-dev vauban --validate "$config"
          done

      - name: Pytest
        run: pixi run -e mlx-dev test

  checks-torch:
    name: Checks (Torch CPU, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          environments: torch-cpu-dev
          frozen: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Backend sanity
        run: pixi run -e torch-cpu-dev backend

      - name: Check
        run: pixi run -e torch-cpu-dev check-torch

  bump-and-publish:
    if: github.event_name == 'push'
    needs: [checks-mlx, checks-torch]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump patch version
        run: |
          git fetch --tags
          git pull --rebase origin main
          CURRENT=$(grep -m1 '__version__' vauban/_version.py | sed 's/.*"\(.*\)".*/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          # Skip if this version was already tagged (e.g. re-run)
          while git tag -l "v$NEW" | grep -q .; do
            PATCH=$((PATCH + 1))
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          done
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" vauban/_version.py
          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vauban/_version.py
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push
          git push --tags

      - name: Pull latest before build
        run: git pull --rebase origin main

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          environments: package
          frozen: true
          cache: true
          cache-write: false

      - name: Build
        run: pixi run -e package build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
