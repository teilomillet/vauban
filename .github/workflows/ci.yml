name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    name: Checks (macOS, Python 3.12)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Git metadata sanity
        run: git submodule status --recursive > /dev/null

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv downloads
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py312-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-py312-uv-

      - name: Sync dependencies
        run: uv sync --frozen --group dev --python 3.12 --no-python-downloads

      - name: Interpreter sanity
        run: |
          .venv/bin/python - <<'PY'
          import sys
          assert sys.version_info[:2] == (3, 12), sys.version
          print(sys.version)
          PY

      - name: Ruff
        run: .venv/bin/ruff check .

      - name: Ty
        run: .venv/bin/ty check

      - name: SPDX headers
        run: .venv/bin/python scripts/license_headers.py --check

      - name: Benchmark examples
        run: |
          .venv/bin/pytest tests/test_benchmark_examples.py tests/test_benchmark_cli.py -q
          for config in examples/benchmarks/*.toml; do
            .venv/bin/vauban --validate "$config"
          done

      - name: Pytest
        run: .venv/bin/pytest -q

  bump-and-publish:
    if: github.event_name == 'push'
    needs: [checks]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Bump patch version
        run: |
          git fetch --tags
          git pull --rebase origin main
          CURRENT=$(grep -m1 '__version__' vauban/_version.py | sed 's/.*"\(.*\)".*/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          # Skip if this version was already tagged (e.g. re-run)
          while git tag -l "v$NEW" | grep -q .; do
            PATCH=$((PATCH + 1))
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          done
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" vauban/_version.py
          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vauban/_version.py
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push
          git push --tags

      - name: Pull latest before build
        run: git pull --rebase origin main

      - name: Build
        run: pip install build && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
