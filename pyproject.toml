[project]
name = "vauban"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic-ai",
    "logfire",
    "lancedb",
    "scikit-learn",
    "openai",
    "numpy",
    "embedding-atlas",
    "anywidget"
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio"
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
