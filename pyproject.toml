[project]
name = "vauban"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "lancedb",
    "scikit-learn",
    "openai",
    "weave",
    "numpy",
    "embedding-atlas",
    "anywidget",
    "pandas",
    "pytest>=9.0.1",
    "python-dotenv>=1.2.1",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio"
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["-W", "ignore::sentry_sdk.hub.SentryHubDeprecationWarning"]

[project.scripts]
vauban = "vauban.entry:main"
