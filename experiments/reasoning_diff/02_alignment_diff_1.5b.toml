[meta]
title = "Alignment diff SVD: Qwen2.5-1.5B-Instruct vs base (control)"
status = "baseline"
parents = ["01_reasoning_diff_1.5b"]
tags = ["diff", "alignment", "svd", "control", "1.5b"]
date = 2026-02-26

# ==========================================================================
# Experiment 02: Extract alignment directions via weight-diff SVD (control)
# ==========================================================================
#
# Computes SVD(W_Qwen2.5-1.5B-Instruct - W_Qwen2.5-1.5B) per layer.
# Control experiment: compare alignment diff spectral structure with
# reasoning diff from experiment 01.
#
# Memory: ~6 GB peak.
# ==========================================================================

[model]
path = "mlx-community/Qwen2.5-1.5B-Instruct-bf16"

[data]
harmful  = "default"
harmless = "default"

[measure]
mode = "diff"
diff_model = "mlx-community/Qwen2.5-1.5B-bf16"
top_k = 20
measure_only = true

[output]
dir = "output/02_alignment_diff_1.5b"
