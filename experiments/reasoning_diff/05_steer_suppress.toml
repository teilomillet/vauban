[meta]
title = "Steer suppress reasoning: R1-Distill-7B"
status = "baseline"
parents = ["01_reasoning_diff_7b", "03_probe_reasoning"]
tags = ["diff", "steer", "reasoning", "suppress", "7b"]
date = 2026-02-26

# ==========================================================================
# Experiment 05: Suppress reasoning direction in R1-Distill model
# ==========================================================================
#
# Steers R1-Distill-Qwen-7B by removing the reasoning direction.
#
# Key question: does removing the reasoning direction from a thinking model
# cause it to give direct answers without chain-of-thought?
#
# Positive alpha = remove the direction (standard steer behavior).
# ==========================================================================

[model]
path = "mlx-community/DeepSeek-R1-Distill-Qwen-7B-4bit"

[data]
harmful  = "default"
harmless = "default"

[measure]
mode = "diff"
diff_model = "mlx-community/Qwen2.5-7B-4bit"
top_k = 10

[steer]
prompts = [
    # Same math problems — does CoT collapse when direction is removed?
    "What is 247 * 83?",
    "A bat and ball cost $1.10 together. The bat costs $1.00 more than the ball. How much does the ball cost?",
    "If it takes 5 machines 5 minutes to make 5 widgets, how long would it take 100 machines to make 100 widgets?",
    "Three friends split a $147 restaurant bill equally. One pays a 20% tip on their share. How much does that person pay?",
]
# Positive alpha = remove direction
alpha = 1.0
max_tokens = 300

[output]
dir = "output/05_steer_suppress"
