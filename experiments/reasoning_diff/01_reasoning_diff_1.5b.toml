[meta]
title = "Reasoning diff SVD: R1-Distill-1.5B vs Qwen2.5-1.5B"
status = "baseline"
tags = ["diff", "reasoning", "svd", "1.5b"]
date = 2026-02-26

# ==========================================================================
# Experiment 01: Extract reasoning directions via weight-diff SVD (1.5B)
# ==========================================================================
#
# Computes SVD(W_R1-Distill-Qwen-1.5B - W_Qwen2.5-1.5B) per layer.
# Primary model = reasoning model (aligned), diff_model = base model.
#
# Output: per-layer singular values, explained variance, top-k directions.
# Key question: is the singular value spectrum concentrated (low-rank)?
#
# Memory: ~6 GB peak (two 1.5B bf16 models). Fits on 24 GB Mac.
# ==========================================================================

[model]
path = "mlx-community/DeepSeek-R1-Distill-Qwen-1.5B-bf16"

[data]
harmful  = "default"
harmless = "default"

[measure]
mode = "diff"
diff_model = "mlx-community/Qwen2.5-1.5B-bf16"
top_k = 20
measure_only = true

[output]
dir = "output/01_reasoning_diff_1.5b"
