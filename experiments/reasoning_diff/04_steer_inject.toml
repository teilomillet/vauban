[meta]
title = "Steer inject reasoning: Qwen2.5-7B-Instruct"
status = "baseline"
parents = ["01_reasoning_diff_7b", "03_probe_reasoning"]
tags = ["diff", "steer", "reasoning", "inject", "7b"]
date = 2026-02-26
notes = "Injects reasoning direction into non-reasoning instruct model via negative alpha. Tests whether amplifying the direction induces chain-of-thought on math problems."

# ==========================================================================
# Experiment 04: Inject reasoning direction into base instruct model
# ==========================================================================
#
# Steers Qwen2.5-7B-Instruct using the reasoning direction extracted
# from the R1-Distill vs Qwen2.5-7B weight diff.
#
# Key question: does amplifying the reasoning direction in a non-reasoning
# model induce chain-of-thought behavior?
#
# We use negative alpha to ADD the direction (steer removes by default,
# so negative = inject). Note: steer only fires when proj > 0, so
# injection only amplifies existing alignment with the reasoning
# direction. Given "base models already reason" findings, the base
# instruct model likely has some positive projection — but verify via
# experiment 03 probe results first.
# ==========================================================================

[model]
path = "mlx-community/Qwen2.5-7B-Instruct-4bit"

[data]
harmful  = "default"
harmless = "default"

[measure]
# Re-extract the direction (measure runs first in the pipeline)
mode = "diff"
diff_model = "mlx-community/Qwen2.5-7B-4bit"
top_k = 10

[steer]
prompts = [
    # Math problems — does the model start showing step-by-step reasoning?
    "What is 247 * 83?",
    "A bat and ball cost $1.10 together. The bat costs $1.00 more than the ball. How much does the ball cost?",
    "If it takes 5 machines 5 minutes to make 5 widgets, how long would it take 100 machines to make 100 widgets?",
    "Three friends split a $147 restaurant bill equally. One pays a 20% tip on their share. How much does that person pay?",
]
# Negative alpha to inject the direction (steer removes by default)
alpha = -1.0
max_tokens = 300

[output]
dir = "output/04_steer_inject"
