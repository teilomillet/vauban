[meta]
title = "Steer suppress reasoning: R1-Distill-1.5B"
status = "baseline"
parents = ["01_reasoning_diff_1.5b", "03_probe_reasoning_1.5b"]
tags = ["diff", "steer", "reasoning", "suppress", "1.5b"]
date = 2026-02-26
notes = "1.5B variant of reasoning suppression. Tests whether smaller model CoT is equally dependent on the reasoning direction."

# ==========================================================================
# Experiment 05: Suppress reasoning direction in R1-Distill (1.5B)
# ==========================================================================
#
# Steers R1-Distill-Qwen-1.5B by removing the reasoning direction.
#
# Key question: does CoT collapse when the reasoning direction is removed?
#
# Memory: ~6 GB peak.
# ==========================================================================

[model]
path = "mlx-community/DeepSeek-R1-Distill-Qwen-1.5B-bf16"

[data]
harmful  = "default"
harmless = "default"

[measure]
mode = "diff"
diff_model = "mlx-community/Qwen2.5-1.5B-bf16"
top_k = 10

[steer]
prompts = [
    "What is 247 * 83?",
    "A bat and ball cost $1.10 together. The bat costs $1.00 more than the ball. How much does the ball cost?",
    "If it takes 5 machines 5 minutes to make 5 widgets, how long would it take 100 machines to make 100 widgets?",
    "Three friends split a $147 restaurant bill equally. One tips 20% on their share. How much does that person pay?",
]
alpha = 1.0
max_tokens = 300

[output]
dir = "output/05_steer_suppress_1.5b"
