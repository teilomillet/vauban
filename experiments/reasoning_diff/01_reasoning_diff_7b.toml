[meta]
title = "Reasoning diff SVD: R1-Distill-7B vs Qwen2.5-7B"
status = "baseline"
tags = ["diff", "reasoning", "svd", "7b"]
date = 2026-02-26

# ==========================================================================
# Experiment 01: Extract reasoning directions via weight-diff SVD
# ==========================================================================
#
# Computes SVD(W_R1-Distill-Qwen-7B - W_Qwen2.5-7B) per layer.
# Primary model = reasoning model (aligned), diff_model = base model.
#
# Output: per-layer singular values, explained variance, top-k directions.
# Key question: is the singular value spectrum concentrated (low-rank)?
#
# Memory: ~35 GB peak (two 7B bf16 models).
# For 32 GB Macs, swap bf16 for 4-bit (auto-dequantized, noisier).
# ==========================================================================

[model]
# The "aligned" model — the one with reasoning capability
path = "mlx-community/DeepSeek-R1-Distill-Qwen-7B-bf16"

[data]
harmful  = "default"
harmless = "default"

[measure]
mode = "diff"
# The "base" model — no reasoning capability
diff_model = "mlx-community/Qwen2.5-7B-bf16"
# Keep more directions to analyze the full spectrum shape
top_k = 20
measure_only = true

[output]
dir = "output/01_reasoning_diff_7b"
