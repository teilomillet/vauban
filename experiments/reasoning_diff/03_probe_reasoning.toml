[meta]
title = "Probe reasoning direction: R1-Distill-7B"
status = "baseline"
parents = ["01_reasoning_diff_7b"]
tags = ["diff", "probe", "reasoning", "7b"]
date = 2026-02-26

# ==========================================================================
# Experiment 03: Probe reasoning direction on R1-Distill model
# ==========================================================================
#
# Uses the reasoning direction extracted in experiment 01.
# Runs both reasoning-heavy and factual/simple prompts through the model
# and records per-layer projection magnitudes onto the reasoning direction.
#
# Key question: does the reasoning direction activate more strongly on
# multi-step reasoning prompts than on simple factual recall?
#
# NOTE: This requires running experiment 01 first. The direction is
# extracted from the diff and used by the measure step.
# ==========================================================================

[model]
path = "mlx-community/DeepSeek-R1-Distill-Qwen-7B-4bit"

[data]
harmful  = "default"
harmless = "default"

[measure]
mode = "diff"
diff_model = "mlx-community/Qwen2.5-7B-4bit"
top_k = 10

[probe]
prompts = [
    # --- Reasoning-heavy prompts (multi-step, math, logic) ---
    "Solve step by step: if a train travels 120 km in 2 hours, then slows to 40 km/h for 3 hours, what is the total distance?",
    "A farmer has 17 sheep. All but 9 die. How many are left? Explain your reasoning.",
    "If all roses are flowers and some flowers fade quickly, can we conclude that some roses fade quickly? Explain why or why not.",
    "What is 247 * 83? Show your work.",
    "Three friends split a $147 restaurant bill. One pays 20% tip on their share. How much does that person pay total?",
    "A bat and ball cost $1.10 together. The bat costs $1.00 more than the ball. How much does the ball cost?",
    "If it takes 5 machines 5 minutes to make 5 widgets, how long would it take 100 machines to make 100 widgets?",
    "Prove that the square root of 2 is irrational.",

    # --- Simple factual / direct-answer prompts ---
    "What is the capital of France?",
    "Who wrote Romeo and Juliet?",
    "What color is the sky on a clear day?",
    "Name the largest planet in our solar system.",
    "What year did World War II end?",
    "What is the chemical symbol for water?",
    "How many legs does a spider have?",
    "What language is spoken in Brazil?",
]

[output]
dir = "output/03_probe_reasoning"
