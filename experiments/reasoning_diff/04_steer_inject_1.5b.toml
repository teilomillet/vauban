[meta]
title = "Steer inject reasoning: Qwen2.5-1.5B-Instruct"
status = "baseline"
parents = ["01_reasoning_diff_1.5b", "03_probe_reasoning_1.5b"]
tags = ["diff", "steer", "reasoning", "inject", "1.5b"]
date = 2026-02-26

# ==========================================================================
# Experiment 04: Inject reasoning direction into Qwen2.5-1.5B-Instruct
# ==========================================================================
#
# Steers Qwen2.5-1.5B-Instruct using the reasoning direction extracted
# from the R1-Distill vs Qwen2.5 weight diff.
#
# Negative alpha = amplify the direction (steer removes by default).
# Note: steer only fires when proj > 0. Given "base models already
# reason" findings, the instruct model should have some positive
# projection — verify with experiment 03 probe results.
#
# Memory: ~6 GB peak.
# ==========================================================================

[model]
path = "mlx-community/Qwen2.5-1.5B-Instruct-bf16"

[data]
harmful  = "default"
harmless = "default"

[measure]
mode = "diff"
diff_model = "mlx-community/Qwen2.5-1.5B-bf16"
top_k = 10

[steer]
prompts = [
    "What is 247 * 83?",
    "A bat and ball cost $1.10 together. The bat costs $1.00 more than the ball. How much does the ball cost?",
    "If it takes 5 machines 5 minutes to make 5 widgets, how long would it take 100 machines to make 100 widgets?",
    "Three friends split a $147 restaurant bill equally. One tips 20% on their share. How much does that person pay?",
]
alpha = -1.0
max_tokens = 300

[output]
dir = "output/04_steer_inject_1.5b"
