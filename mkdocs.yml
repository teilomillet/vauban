site_name: Vauban
site_description: MLX-native toolkit for understanding and reshaping how language models behave
site_url: https://vauban.readthedocs.io/
repo_url: https://github.com/teilomillet/vauban
repo_name: teilomillet/vauban

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
    - Surface Mapping: surface.md
    - HuggingFace Datasets: hf-datasets.md
  - "Spinning Up in Abliteration":
    - Overview: class/index.md
    - "Part 1: What is Abliteration?": class/part1_what_is_abliteration.md
    - "Part 2: Your First Abliteration": class/part2_your_first_abliteration.md
    - "Part 3: Under the Hood": class/part3_under_the_hood.md
    - "Part 4: The Refusal Surface": class/part4_the_refusal_surface.md
    - "Part 5: Going Deeper": class/part5_going_deeper.md
    - "Part 6: Attacks and Defenses": class/part6_attacks_and_defenses.md
    - "Part 7: Production Workflows": class/part7_production_workflows.md
    - References: class/references.md
    - Glossary: class/glossary.md
  - Configuration Reference: config.md
