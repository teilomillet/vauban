[model]
# Replace with the transformed model path or local PyTorch/Hugging Face model directory.
path = "models/qwen2.5-coder-7b-candidate"

[data]
harmful = "default"
harmless = "default"

[behavior_trace]
model_label = "qwen2.5-coder-7b-candidate"
suite = "suite.toml"
max_tokens = 192
record_outputs = true
collect_runtime_evidence = false
output_trace = "../../output/examples/qwen_coding_refusal_audit/candidate/candidate.jsonl"
json_filename = "candidate_behavior_trace_report.json"

[output]
dir = "../../output/examples/qwen_coding_refusal_audit/candidate"
