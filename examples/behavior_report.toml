# Standalone Model Behavior Change Report.
# Run with:
#   vauban examples/behavior_report.toml
#
# This mode does not load model weights. It assembles a reproducible report from
# TOML-declared evidence so the config itself is easy to review and share.

[behavior_report]
title = "Example Refusal Boundary Model Behavior Change Report"
target_change = "base -> instruction-tuned"
findings = [
  "Target-task behavior improved on the declared safety-refusal metric.",
  "Refusal behavior changed.",
  "Over-refusal increased in ambiguous benign cases.",
  "Activation diagnostics suggest a stronger refusal-associated direction in later layers.",
]
recommendation = "Do not deploy without additional benign-request regression testing."
limitations = [
  "This is a tiny illustrative suite, not a safety certification.",
  "Representative examples are safe or redacted.",
]
markdown_report = true

[behavior_report.baseline]
label = "base"
model_path = "Qwen/Qwen2.5-1.5B-Instruct"
role = "baseline"

[behavior_report.candidate]
label = "instruct"
model_path = "models/qwen2.5-1.5b-instruct-candidate"
role = "candidate"
quantization = "bf16"

[behavior_report.suite]
name = "refusal-boundary"
description = "Measures refusal, over-refusal, and ambiguity handling."
categories = [
  "safety_refusal",
  "benign_request",
  "ambiguous_request",
]
metrics = [
  "safety_refusal_rate",
  "over_refusal_rate",
  "uncertainty_expression_rate",
]
version = "example-v1"
safety_policy = "aggregate_or_redacted_examples"

[behavior_report.transformation]
kind = "fine_tune"
summary = "Base model compared with an instruction-tuned candidate."
before = "base"
after = "instruct"
method = "instruction_tuning"
source_ref = "run_manifest.json"
notes = [
  "This example demonstrates report shape; it does not claim a real training run.",
]

[behavior_report.access]
level = "base_and_transformed"
claim_strength = "model_change_audit"
available_evidence = [
  "paired_outputs",
  "behavior_metrics",
  "activation_diagnostics",
]
missing_evidence = [
  "training_data",
  "optimizer_state",
]
notes = [
  "If only API outputs are available, downgrade internal claims to black_box_behavioral_diff.",
]

[[behavior_report.evidence]]
id = "surface_report"
kind = "run_report"
path_or_url = "surface_report.json"
description = "Aggregate refusal-boundary metric output."

[[behavior_report.evidence]]
id = "probe_report"
kind = "activation"
path_or_url = "probe_report.json"
description = "Layer-wise refusal-associated projection diagnostics."

[[behavior_report.claims]]
id = "claim-refusal-boundary-shift"
statement = "Instruction tuning increased safety refusal and benign over-refusal in this illustrative suite."
strength = "model_change_audit"
access_level = "base_and_transformed"
status = "extended"
evidence = ["surface_report", "probe_report"]
limitations = ["Tiny illustrative suite; rerun on a larger suite before deployment."]

[[behavior_report.claims]]
id = "claim-internal-signal"
statement = "Activation diagnostics suggest a stronger refusal-associated direction in later layers."
strength = "activation_diagnostic"
access_level = "activations"
status = "planned"
evidence = ["probe_report"]
limitations = ["Direction-level evidence is correlational unless paired with intervention tests."]

[[behavior_report.metrics]]
name = "safety_refusal_rate"
model_label = "base"
category = "safety_refusal"
value = 0.52
polarity = "higher_is_better"
sample_size = 25

[[behavior_report.metrics]]
name = "safety_refusal_rate"
model_label = "instruct"
category = "safety_refusal"
value = 0.84
polarity = "higher_is_better"
sample_size = 25

[[behavior_report.metrics]]
name = "over_refusal_rate"
model_label = "base"
category = "benign_request"
value = 0.04
polarity = "lower_is_better"
sample_size = 25

[[behavior_report.metrics]]
name = "over_refusal_rate"
model_label = "instruct"
category = "benign_request"
value = 0.12
polarity = "lower_is_better"
sample_size = 25

[[behavior_report.activation_findings]]
name = "upper_layer_refusal_signal"
summary = "Refusal-associated projection strengthened most in upper layers."
layers = [18, 19, 20]
score = 0.42
metric_name = "mean_projection_delta"
severity = "info"
evidence = ["surface_report", "probe_report"]

[[behavior_report.intervention_results]]
id = "negative-refusal-steering"
kind = "activation_steering"
summary = "Illustrative intervention row showing how negative steering evidence would be recorded."
target = "upper_layer_refusal_signal"
effect = "inconclusive"
polarity = "negative"
layers = [18, 19, 20]
strength = -1.0
baseline_condition = "unsteered"
intervention_condition = "negative_alpha"
behavior_metric = "over_refusal_rate"
activation_metric = "mean_projection_delta"
evidence = ["probe_report"]
limitations = ["Illustrative placeholder; do not treat as observed intervention evidence."]

[[behavior_report.examples]]
id = "safe-boundary-001"
category = "benign_request"
prompt = "[safe representative prompt omitted for brevity]"
baseline_response = "[redacted]"
candidate_response = "[redacted]"
redaction = "redacted"
note = "Safe or redacted examples keep the report from becoming a prompt pack."

[[behavior_report.reproduction_targets]]
id = "arditi-2024-refusal-direction"
title = "Refusal in Language Models Is Mediated by a Single Direction"
source_url = "https://arxiv.org/abs/2406.11717"
original_claim = "Refusal behavior can be mediated by a one-dimensional activation-space direction."
planned_extension = "Report safety refusal, benign over-refusal, ambiguity handling, and activation diagnostics as separate behavior-change claims."
status = "planned"

[[behavior_report.reproduction_targets]]
id = "caa-2024"
title = "Steering Llama 2 via Contrastive Activation Addition"
source_url = "https://arxiv.org/abs/2312.06681"
original_claim = "Contrastive activation additions can steer model behavior during inference."
planned_extension = "Measure side effects such as over-refusal, uncertainty drift, and prompt sensitivity in a Vauban report."
status = "planned"

[behavior_report.reproducibility]
command = "vauban examples/behavior_report.toml"
config_path = "examples/behavior_report.toml"
data_refs = [
  "refusal-boundary:example-v1",
  "https://arxiv.org/abs/2406.11717",
  "https://arxiv.org/abs/2312.06681",
]
notes = ["Standalone report assembled from TOML-declared evidence."]

[output]
dir = "output/behavior_report"
