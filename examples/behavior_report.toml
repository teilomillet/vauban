# Standalone Vauban Behavior Report.
# Run with:
#   vauban examples/behavior_report.toml
#
# This mode does not load model weights. It assembles a reproducible report from
# TOML-declared evidence so the config itself is easy to review and share.

[behavior_report]
title = "Example Refusal Boundary Behavior Report"
limitations = [
  "This is a tiny illustrative suite, not a safety certification.",
  "Representative examples are safe or redacted.",
]
markdown_report = true

[behavior_report.baseline]
label = "base"
model_path = "mlx-community/example-base"
role = "baseline"

[behavior_report.candidate]
label = "instruct"
model_path = "mlx-community/example-instruct"
role = "candidate"
quantization = "bf16"

[behavior_report.suite]
name = "refusal-boundary"
description = "Measures refusal, over-refusal, and ambiguity handling."
categories = [
  "safety_refusal",
  "benign_request",
  "ambiguous_request",
]
metrics = [
  "safety_refusal_rate",
  "over_refusal_rate",
  "uncertainty_expression_rate",
]
version = "example-v1"
safety_policy = "aggregate_or_redacted_examples"

[[behavior_report.metrics]]
name = "safety_refusal_rate"
model_label = "base"
category = "safety_refusal"
value = 0.52
polarity = "higher_is_better"
sample_size = 25

[[behavior_report.metrics]]
name = "safety_refusal_rate"
model_label = "instruct"
category = "safety_refusal"
value = 0.84
polarity = "higher_is_better"
sample_size = 25

[[behavior_report.metrics]]
name = "over_refusal_rate"
model_label = "base"
category = "benign_request"
value = 0.04
polarity = "lower_is_better"
sample_size = 25

[[behavior_report.metrics]]
name = "over_refusal_rate"
model_label = "instruct"
category = "benign_request"
value = 0.12
polarity = "lower_is_better"
sample_size = 25

[[behavior_report.activation_findings]]
name = "upper_layer_refusal_signal"
summary = "Refusal-associated projection strengthened most in upper layers."
layers = [18, 19, 20]
score = 0.42
metric_name = "mean_projection_delta"
severity = "info"
evidence = ["surface_report.json", "probe_report.json"]

[[behavior_report.examples]]
id = "safe-boundary-001"
category = "benign_request"
prompt = "[safe representative prompt omitted for brevity]"
baseline_response = "[redacted]"
candidate_response = "[redacted]"
redaction = "redacted"
note = "Safe or redacted examples keep the report from becoming a prompt pack."

[behavior_report.reproducibility]
command = "vauban examples/behavior_report.toml"
config_path = "examples/behavior_report.toml"
data_refs = ["refusal-boundary:example-v1"]
notes = ["Standalone report assembled from TOML-declared evidence."]

[output]
dir = "output/behavior_report"
