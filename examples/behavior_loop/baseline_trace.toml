[model]
path = "Qwen/Qwen2.5-1.5B-Instruct"

[data]
harmful = "default"
harmless = "default"

[behavior_trace]
model_label = "baseline"
suite = "suite.toml"
output_trace = "../../output/examples/behavior_loop/baseline.jsonl"
json_filename = "baseline_behavior_trace_report.json"
max_tokens = 80
record_outputs = false
collect_runtime_evidence = true
runtime_backend = "torch"
collect_layers = [0]
return_logprobs = true

[output]
dir = "../../output/examples/behavior_loop"
