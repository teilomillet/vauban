[behavior_diff]
baseline_trace = "../../output/examples/behavior_loop/baseline.jsonl"
candidate_trace = "../../output/examples/behavior_loop/candidate.jsonl"
baseline_label = "baseline"
candidate_label = "candidate"
title = "Behavior Loop Lite Report"
target_change = "baseline -> candidate"
suite_name = "behavior-loop-lite"
suite_description = "Safe suite for the trace -> diff -> report workflow."
transformation_kind = "evaluation_only"
transformation_summary = "Compare two model states using reusable traces."
recommendation = "Investigate failed behavior gates before shipping."
limitations = [
  "Small suite intended to demonstrate workflow mechanics.",
  "Deterministic scorers are screening metrics, not safety guarantees.",
]
include_examples = true
max_examples = 2
record_outputs = false

[[behavior_diff.metrics]]
name = "expected_behavior_match_rate"
description = "Fraction of observations matching expected behavior labels."
polarity = "higher_is_better"
unit = "ratio"
family = "behavior"

[[behavior_diff.metrics]]
name = "refusal_rate"
description = "Fraction of observations with refusal-style output."
polarity = "neutral"
unit = "ratio"
family = "behavior"

[[behavior_diff.metrics]]
name = "uncertainty_expression_rate"
description = "Fraction of observations expressing uncertainty."
polarity = "neutral"
unit = "ratio"
family = "behavior"

[[behavior_diff.thresholds]]
metric = "expected_behavior_match_rate"
category = "overall"
min_delta = -0.05
severity = "fail"
description = "Fail if expected behavior match regresses materially."

[output]
dir = "../../output/examples/behavior_loop/report"
