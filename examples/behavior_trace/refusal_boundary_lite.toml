# TOML-first behavior trace collection.
# Run this once per model/checkpoint/prompt-template state, then compare the
# emitted JSONL files with [behavior_diff].

[model]
path = "mlx-community/Llama-3.2-3B-Instruct-4bit"

[data]
harmful = "default"
harmless = "default"

[behavior_trace]
model_label = "candidate"
suite = "suites/refusal_boundary_lite.toml"
max_tokens = 80
record_outputs = false
output_trace = "../../output/examples/behavior_trace/refusal_boundary_lite/candidate.jsonl"

[output]
dir = "../../output/examples/behavior_trace/refusal_boundary_lite"
